<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Activate Tournament Lab V4</title>
<style>
body{font-family:system-ui,sans-serif;background:#07101f;color:#eef2ff;display:grid;place-items:center;min-height:100vh;margin:0}
main{max-width:580px;background:#12203a;border:1px solid #2c3d5d;border-radius:18px;padding:24px}
p{color:#b8c4d7;line-height:1.5}
</style>
</head>
<body>
<main>
<h1>Activating Tournament Lab V4</h1>
<p id="status">Removing older app caches and service workers…</p>
</main>
<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    if('serviceWorker' in navigator){
      const registrations=await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(registration=>registration.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(key=>caches.delete(key)));
    }
    status.textContent='V4 reset complete. Opening the low-gap optimizer…';
    setTimeout(()=>location.replace('./?v=4.0.0&fresh='+Date.now()),700);
  }catch(error){
    status.textContent='Reset failed: '+error;
  }
})();
</script>
</body>
</html>
