<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071016">
  <title>X Tournament Director 2</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="#/collection" aria-label="X Tournament Director home">
      <span class="brand-mark">X</span>
      <span><strong>X Tournament Director</strong><small id="headerStatus">Inventory empty</small></span>
    </a>
    <button class="icon-button" data-action="open-settings" aria-label="Settings">⚙</button>
  </header>

  <nav class="step-nav" aria-label="Main workflow">
    <a href="#/collection" data-route="collection"><b>1</b><span>Collection</span></a>
    <a href="#/deck" data-route="deck"><b>2</b><span>Deck</span></a>
    <a href="#/test" data-route="test"><b>3</b><span>Test</span></a>
    <a href="#/match" data-route="match"><b>4</b><span>Match</span></a>
  </nav>

  <main id="app" tabindex="-1"></main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <dialog id="settingsDialog" class="dialog">
    <form method="dialog">
      <div class="dialog-head"><h2>App settings</h2><button class="icon-button" value="cancel" aria-label="Close">×</button></div>
      <p class="muted">Your inventory and evidence are saved only in this browser.</p>
      <div class="button-row">
        <button type="button" class="button secondary" data-action="export-data">Export backup</button>
        <label class="button secondary file-label">Import backup<input hidden type="file" accept="application/json" data-action="import-data"></label>
        <button type="button" class="button danger" data-action="reset-app">Reset app</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
