  <style>
:root{
  color-scheme:dark;--bg:#071016;--surface:#0d1822;--surface2:#132235;--line:#26374c;
  --text:#f5f8fc;--muted:#9eacc0;--accent:#39d7ad;--accent2:#51b8ff;--danger:#ff6d7a;
  --warning:#ffc861;--radius:22px;--shadow:0 16px 50px #0008;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif
}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:radial-gradient(circle at 90% -10%,#12324a 0,transparent 32rem),var(--bg);color:var(--text);min-height:100vh}
button,input,select,textarea{font:inherit}button,a{touch-action:manipulation}.app-header{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px max(18px,env(safe-area-inset-left));background:#071016eF;border-bottom:1px solid var(--line);backdrop-filter:blur(15px)}
.brand{display:flex;gap:12px;align-items:center;color:inherit;text-decoration:none}.brand-mark{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:25px;color:#061319;background:linear-gradient(135deg,var(--accent),var(--accent2))}.brand strong{display:block;font-size:18px}.brand small{display:block;color:var(--muted);margin-top:3px}.icon-button{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:15px;width:46px;height:46px;font-size:22px;cursor:pointer}
.step-nav{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;max-width:1000px;margin:18px auto 0;padding:0 18px}.step-nav a{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;color:var(--muted);border:1px solid var(--line);background:#0b1520;border-radius:999px;padding:11px 8px;font-size:14px}.step-nav a b{display:grid;place-items:center;width:23px;height:23px;border-radius:50%;background:#1b2a3c;color:#c9d4e3}.step-nav a.active{background:var(--accent);border-color:var(--accent);color:#071016}.step-nav a.active b{background:#071016;color:var(--accent)}
main{max-width:1000px;margin:0 auto;padding:20px 18px 80px}.page-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin:16px 0 20px}.eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:12px;color:var(--accent);font-weight:800}.page-head h1{font-size:clamp(32px,7vw,54px);line-height:1.05;margin:8px 0}.page-head p{color:var(--muted);max-width:660px;margin:0;line-height:1.65}.grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{background:linear-gradient(180deg,#0f1d29,#0b151f);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 12px 40px #0003}.card.accent{border-color:#2cae8b;background:linear-gradient(180deg,#0e2828,#0b181e)}.card h2,.card h3{margin:0 0 10px}.muted{color:var(--muted);line-height:1.6}.status-card{display:flex;justify-content:space-between;align-items:center;gap:18px}.status-card strong{font-size:23px}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;background:#19324a;color:#bcd7ef;font-size:12px;font-weight:800}.badge.good{background:#123e34;color:#65ecc9}.badge.warn{background:#493a18;color:#ffd271}.button{border:0;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#061319;padding:14px 18px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;gap:8px}.button.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--line)}.button.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}.button.danger{background:#40212a;color:#ffabb3;border:1px solid #67303c}.button:disabled{opacity:.45;cursor:not-allowed}.button-row{display:flex;gap:10px;flex-wrap:wrap}.command{display:flex;align-items:center;justify-content:space-between;gap:20px}.command h2{font-size:26px}.command p{margin:7px 0 0;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr auto;gap:10px}.field{width:100%;padding:14px 15px;border:1px solid var(--line);border-radius:14px;background:#08131d;color:var(--text);outline:none}.field:focus{border-color:var(--accent)}.catalog-tools{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:14px}.filter-row{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.filter{white-space:nowrap;border:1px solid var(--line);background:#0c1824;color:var(--muted);border-radius:999px;padding:8px 12px;cursor:pointer}.filter.active{background:var(--accent);color:#061319;border-color:var(--accent)}.catalog-list,.inventory-list{display:grid;gap:10px;max-height:520px;overflow:auto;padding-right:2px}.catalog-item,.inventory-item{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px;border:1px solid var(--line);border-radius:16px;background:#0b1722}.catalog-item strong,.inventory-item strong{display:block}.catalog-item small,.inventory-item small{color:var(--muted);display:block;margin-top:4px}.part-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.pill{font-size:11px;background:#172639;color:#bdd0e5;border-radius:999px;padding:5px 8px}.mini{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:#132235;color:var(--text);font-size:19px;cursor:pointer}.empty{text-align:center;padding:48px 20px}.empty-icon{font-size:42px}.progress{height:9px;border-radius:999px;background:#182536;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.deck-summary{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.metric{background:#0a1520;border:1px solid var(--line);border-radius:15px;padding:13px}.metric small{color:var(--muted);display:block}.metric strong{font-size:21px;display:block;margin-top:5px}.bey-card{position:relative;overflow:hidden}.bey-card .slot{color:var(--accent);font-weight:900;letter-spacing:.15em;font-size:11px}.bey-card h2{font-size:24px;margin:8px 0}.bey-meta{display:flex;gap:8px;flex-wrap:wrap}.role{padding:6px 10px;border-radius:999px;font-size:12px;background:#19324a}.confidence{padding:6px 10px;border-radius:999px;font-size:12px;background:#173a30;color:#6fe7c6}.detail-list{display:grid;gap:12px;margin-top:18px}.detail-row{display:grid;grid-template-columns:110px 1fr;gap:12px;border-top:1px solid #213043;padding-top:12px}.detail-row dt{color:var(--muted)}.detail-row dd{margin:0;line-height:1.55}.match-bars{display:grid;gap:8px;margin-top:15px}.bar-row{display:grid;grid-template-columns:100px 1fr 40px;gap:10px;align-items:center;font-size:13px}.bar{height:8px;background:#1a2a3b;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}.alternative{display:flex;justify-content:space-between;gap:12px;padding:14px 0;border-top:1px solid var(--line)}
.test-versus{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center}.versus{font-size:20px;color:var(--accent);font-weight:900}.battle-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.battle-buttons button{padding:20px}.results{display:flex;gap:8px;margin-top:14px}.result-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#162435;color:var(--muted)}.result-dot.win{background:#164b3c;color:#75edcc}.result-dot.loss{background:#51252d;color:#ffadb5}.score{font-size:58px;font-weight:900}.finish-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.finish-grid button{padding:15px}.history-row{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:12px 0}.dialog{width:min(620px,calc(100% - 28px));background:#0d1822;color:var(--text);border:1px solid var(--line);border-radius:22px;padding:22px}.dialog::backdrop{background:#000a}.dialog-head{display:flex;justify-content:space-between;align-items:center}.file-label input{display:none}.toast{position:fixed;z-index:50;left:50%;bottom:24px;transform:translate(-50%,30px);opacity:0;background:#f4f8fb;color:#081018;border-radius:999px;padding:11px 17px;transition:.2s;pointer-events:none}.toast.show{transform:translate(-50%,0);opacity:1}.build-mark{position:fixed;right:8px;bottom:8px;font-size:9px;color:#597086;opacity:.65;z-index:2}.loading{display:flex;align-items:center;gap:12px}.spinner{width:24px;height:24px;border:3px solid #294153;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){.step-nav a{padding:8px 3px;flex-direction:column;gap:3px;font-size:11px}.step-nav a span{display:block}.step-nav a b{width:22px;height:22px}.grid.two,.grid.three,.deck-summary{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(2,1fr)}.page-head{align-items:flex-start;flex-direction:column}.command,.status-card{align-items:flex-start;flex-direction:column}.command .button{width:100%}.test-versus{grid-template-columns:1fr}.versus{text-align:center}.catalog-tools,.form-grid{grid-template-columns:1fr}.detail-row{grid-template-columns:1fr;gap:4px}.bar-row{grid-template-columns:86px 1fr 36px}.brand strong{font-size:16px}.brand-mark{width:42px;height:42px}}

</style>

<script>
window.addEventListener('error',function(event){
  const app=document.getElementById('app');
  if(app && !app.children.length){
    app.innerHTML='<section class="card" style="margin-top:20px"><div class="eyebrow">Startup error</div><h1>The app could not start.</h1><p class="muted">Reload once. If this message remains, replace the repository with the latest root-only package.</p><pre style="white-space:pre-wrap;color:#ffabb3">'+String(event.message||'Unknown error').replace(/[&<>]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]})+'</pre></section>';
  }
});
</script>

  </dialog>

// src/state.js
const KEY='x-tournament-director-v2';
const defaults={inventory:[],evidence:[],locks:[],analysis:null,selectedDeckId:null,testSession:null,testResults:[],match:{me:0,opponent:0,battles:[]},catalogFilter:'all'};
let memory=null;
function readRaw(){try{return localStorage.getItem(KEY)}catch{return memory}}
function writeRaw(value){memory=value;try{localStorage.setItem(KEY,value)}catch{}}
function removeRaw(){memory=null;try{localStorage.removeItem(KEY)}catch{}}
let state=load();
const listeners=new Set();
function load(){try{return {...structuredClone(defaults),...JSON.parse(readRaw()||'{}'),analysis:null,testSession:null,testResults:[]}}catch{return structuredClone(defaults)}}
function persist(){const {analysis,testSession,testResults,...saved}=state;writeRaw(JSON.stringify(saved))}
function getState(){return state}
function setState(patch,{save=true}={}){state={...state,...patch};if(save)persist();listeners.forEach(fn=>fn(state))}
function mutate(fn,{save=true}={}){const next=structuredClone(state);fn(next);state=next;if(save)persist();listeners.forEach(fn=>fn(state))}
function subscribe(fn){listeners.add(fn);return()=>listeners.delete(fn)}
function reset(){state=structuredClone(defaults);removeRaw();listeners.forEach(fn=>fn(state))}
function exportState(){const {analysis,testSession,testResults,...saved}=state;return JSON.stringify({version:2,exportedAt:new Date().toISOString(),state:saved},null,2)}
function importState(raw){const data=JSON.parse(raw);const incoming=data.state||data;if(!Array.isArray(incoming.inventory)||!Array.isArray(incoming.evidence))throw new Error('Invalid backup file.');state={...structuredClone(defaults),...incoming,analysis:null,testSession:null,testResults:[]};persist();listeners.forEach(fn=>fn(state))}

const ROUTES=new Set(['collection','deck','test','match']);
function currentRoute(){const value=location.hash.replace(/^#\/?/,'').split('/')[0];return ROUTES.has(value)?value:'collection'}
function go(route){if(!ROUTES.has(route))route='collection';location.hash=`#/${route}`}
function startRouter(render){addEventListener('hashchange',()=>render(currentRoute()));if(!location.hash)history.replaceState(null,'','#/collection');render(currentRoute())}

const OVERRIDES={
'blade:scorpiospear':[66,47,54,59,55,54,70,49],'blade:silverwolf':[31,93,67,82,60,20,27,55],'blade:phoenixwing':[87,45,54,60,56,75,86,61],'blade:impactdrake':[93,27,48,60,59,73,94,66],'blade:dranstrike':[89,43,58,71,68,62,90,68],'blade:bulletgriffon':[58,74,77,64,72,42,62,88],

};
const canonical=v=>String(v||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
function profile(role='balance',category='blade',name=''){const override=OVERRIDES[`${category}:${canonical(name)}`];if(override)return Object.fromEntries(KEYS.map((k,i)=>[k,override[i]]));const base=ROLE_PRESETS[role]||ROLE_PRESETS.balance,w=CATEGORY_WEIGHT[category]||.3;return Object.fromEntries(KEYS.map(k=>[k,Math.round(50+(base[k]-50)*w)]))}
function bitDetails(code){return BIT_INFO[String(code||'').trim()]||[String(code||'Unknown Bit'),'balance']}
function combine(parts){const total=parts.reduce((s,p)=>s+(CATEGORY_WEIGHT[p.category]||.3),0)||1;return Object.fromEntries(KEYS.map(k=>[k,Math.round(parts.reduce((s,p)=>s+(p.profile?.[k]??50)*(CATEGORY_WEIGHT[p.category]||.3),0)/total)]))}
function roleFrom(v){const scores={Attack:v.atk+v.ko-v.recoil*.25,Stamina:v.sta+v.ctl*.35,Defense:v.def+v.burst*.35};const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);return sorted[0][1]-sorted[1][1]<10?'Balance':sorted[0][0]}


// src/engine/inventory.js

const uid=()=>crypto.randomUUID?.()||`${Date.now()}-${Math.random()}`;
function makePart(category,name,role='balance',extra={}){return {id:uid(),category,name,canonical:canonical(name),role,profile:profile(role,category,name),code:extra.code||'',height:extra.height||null,integratedRatchet:Boolean(extra.integratedRatchet),estimated:Boolean(extra.estimated)}}
function parseHeight(name){const m=String(name).match(/-(\d{2})/);return m?Number(m[1]):null}
function partsForBey(bey){const role=bey.role||bitDetails(bey.bit||bey.fused)[1]||'balance';if(bey.system==='standard')return [makePart('blade',bey.blade,role),makePart('ratchet',bey.ratchet,'balance',{height:parseHeight(bey.ratchet)}),makePart('bit',bitDetails(bey.bit)[0],bitDetails(bey.bit)[1],{code:bey.bit})];if(bey.system==='integrated')return [makePart('blade',bey.blade,role,{integratedRatchet:true}),makePart('bit',bitDetails(bey.bit)[0],bitDetails(bey.bit)[1],{code:bey.bit})];if(bey.system==='cx-standard')return [makePart('lock',bey.lock,role),makePart('main',bey.main,role),makePart('assist',bey.assist,role),makePart('ratchet',bey.ratchet,'balance',{height:parseHeight(bey.ratchet)}),makePart('bit',bitDetails(bey.bit)[0],bitDetails(bey.bit)[1],{code:bey.bit})];if(bey.system==='cx-expand')return [makePart('lock',bey.lock,role),makePart('over',bey.over,role),makePart('metal',bey.metal,role),makePart('assist',bey.assist,role),makePart('ratchet',bey.ratchet,'balance',{height:parseHeight(bey.ratchet)}),makePart('bit',bitDetails(bey.bit)[0],bitDetails(bey.bit)[1],{code:bey.bit})];if(bey.system==='cx-integrated')return [makePart('lock',bey.lock,role),makePart('main',bey.main,role),makePart('assist',bey.assist,role),makePart('fused',bey.fusedName||bey.fused,role,{code:bey.fused})];return []}
function productToEntry(product){const parts=product.beys.flatMap(partsForBey);for(const p of product.parts||[])parts.push(makePart(p.category,p.name,p.role||'balance',{height:p.height,code:p.code}));return {id:uid(),kind:'set',catalogId:product.id,code:product.code,name:product.title,line:product.line,type:product.type,parts,createdAt:new Date().toISOString()}}
function customLoosePart(category,name,role='balance',code=''){return {id:uid(),kind:'loose',code:'LOOSE',name,parts:[makePart(category,name,role,{code,estimated:true})],createdAt:new Date().toISOString()}}
function physicalParts(inventory){const groups={blade:[],lock:[],main:[],over:[],metal:[],assist:[],ratchet:[],bit:[],fused:[]};for(const entry of inventory)for(const p of entry.parts||[])groups[p.category]?.push({...p,physicalId:`${entry.id}:${p.id}`,source:`${entry.code} · ${entry.name}`,canonicalKey:canonical(p.canonical||p.name)});return groups}


// src/engine/combinations.js

function restricted(part){if(part.category!=='lock')return true;const k=canonical(part.name);return ['valkyrie','warukyuure','emperor'].some(x=>k.includes(x))}
function nameFor(parts,system){const get=c=>parts.find(p=>p.category===c);const bit=get('bit'),rat=get('ratchet'),blade=get('blade');if(blade)return system==='integrated'?`${blade.name} ${bit?.code||bit?.name}`:`${blade.name} ${rat?.name}${bit?.code||bit?.name}`;const lock=get('lock'),main=get('main'),over=get('over'),metal=get('metal'),assist=get('assist'),fused=get('fused');const core=main?`${lock?.name||''}${main.name}`:`${lock?.name||''}${over?.name||''}${metal?.name||''}`;return fused?`${core} ${assist?.name||''}${fused.code||fused.name}`:`${core} ${assist?.name||''}${rat?.name||''}${bit?.code||bit?.name}`}
function make(parts,system){if(new Set(parts.map(p=>p.physicalId)).size!==parts.length)return null;const vector=combine(parts),signature=parts.map(p=>`${p.category}:${p.canonicalKey}`).sort().join('|');return {signature,name:nameFor(parts,system).replace(/\s+/g,' ').trim(),system,role:roleFrom(vector),profile:vector,parts,allocations:[parts.map(p=>p.physicalId)],canonicalParts:parts.map(p=>({category:p.category,key:p.canonicalKey,restricted:restricted(p)})),sourceLabels:[...new Set(parts.map(p=>p.source))]}}
function generateCombinations(g){const raw=[];for(const b of g.blade){if(b.integratedRatchet){for(const bit of g.bit)raw.push(make([b,bit],'integrated'))}else for(const r of g.ratchet)for(const bit of g.bit)raw.push(make([b,r,bit],'standard'))}for(const l of g.lock)for(const m of g.main)for(const a of g.assist)for(const r of g.ratchet)for(const b of g.bit)raw.push(make([l,m,a,r,b],'cx-standard'));for(const l of g.lock)for(const o of g.over)for(const m of g.metal)for(const a of g.assist)for(const r of g.ratchet)for(const b of g.bit)raw.push(make([l,o,m,a,r,b],'cx-expand'));for(const l of g.lock)for(const m of g.main)for(const a of g.assist)for(const f of g.fused)raw.push(make([l,m,a,f],'cx-integrated'));

function compatibleNames(a,b){for(const pa of a.canonicalParts)for(const pb of b.canonicalParts)if(pa.category===pb.category&&pa.key===pb.key&&(pa.restricted||pb.restricted))return false;return true}
function allocateDeck(combos){function walk(i,used,allocs){if(i===combos.length)return allocs;for(const allocation of combos[i].allocations){if(allocation.some(id=>used.has(id)))continue;const next=new Set(used);allocation.forEach(id=>next.add(id));const result=walk(i+1,next,[...allocs,allocation]);if(result)return result}return null}return walk(0,new Set(),[])}

const ARCHETYPES=[{id:'attack',name:'Heavy attack',v:{atk:88,sta:34,def:46,ctl:50,burst:54,recoil:72,ko:89,mass:67}},{id:'stamina',name:'Pure stamina',v:{atk:30,sta:91,def:61,ctl:78,burst:58,recoil:24,ko:28,mass:52}},{id:'defense',name:'Defense / counter',v:{atk:43,sta:63,def:86,ctl:71,burst:78,recoil:28,ko:41,mass:68}},{id:'balance',name:'Adaptive balance',v:{atk:61,sta:62,def:62,ctl:66,burst:62,recoil:46,ko:60,mass:57}}];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function evidenceFor(sig,evidence){let w=0,l=0;for(const e of evidence)if(e.subjectSignature===sig){w+=e.wins||0;l+=e.losses||0}return {wins:w,losses:l,games:w+l}}
function winChance(c,a){const v=c.profile,o=a.v;const offense=(v.atk*.42+v.ko*.35+v.mass*.15-v.recoil*.18);const staying=(v.sta*.34+v.def*.26+v.ctl*.22+v.burst*.18);const opp=(o.atk+o.sta+o.def+o.ko)/4;return clamp(.5+(offense*.45+staying*.55-opp)*.007,.18,.82)}
function posterior(c,evidence){const e=evidenceFor(c.signature,evidence);const prior=comboBase(c);return {mean:(prior*6+e.wins)/(6+e.games),games:e.games}}
function comboBase(c){const v=c.profile;return clamp((v.atk*.16+v.sta*.17+v.def*.14+v.ctl*.16+v.burst*.1+v.ko*.2+v.mass*.1-v.recoil*.08)/100,.2,.86)}
function matchupMap(c){return Object.fromEntries(ARCHETYPES.map(a=>[a.id,winChance(c,a)]))}
function individualScore(c,evidence){const p=posterior(c,evidence),m=matchupMap(c),floor=Math.min(...Object.values(m));const critical=clamp((c.profile.ko*.65+c.profile.atk*.35-c.profile.recoil*.18)/100,0,1);return p.mean*.38+floor*.3+critical*.18+(c.profile.ctl/100)*.14}
function deckMetrics(combos,evidence){const maps=combos.map(matchupMap);const coverage=ARCHETYPES.map(a=>Math.max(...maps.map(m=>m[a.id])));const backup=ARCHETYPES.map(a=>maps.map(m=>m[a.id]).sort((x,y)=>y-x)[1]);const floor=Math.min(...coverage),backupFloor=Math.min(...backup);const roles=new Set(combos.map(c=>c.role)).size;const criticalFloor=Math.min(...combos.map(c=>clamp((c.profile.ko*.65+c.profile.atk*.35-c.profile.recoil*.2)/100,0,1)));const risk=combos.reduce((s,c)=>s+c.profile.recoil/100,0)/3;const control=combos.reduce((s,c)=>s+c.profile.ctl/100,0)/3;const evidenceGames=combos.reduce((s,c)=>s+evidenceFor(c.signature,evidence).games,0);const score=floor*.36+backupFloor*.2+criticalFloor*.16+control*.1+(roles/3)*.1-risk*.08+Math.min(evidenceGames/60,.05);return {score,coverage,backup,floor,backupFloor,criticalFloor,risk,control,roles,evidenceGames}}
function permutations(a){return [[a[0],a[1],a[2]],[a[0],a[2],a[1]],[a[1],a[0],a[2]],[a[1],a[2],a[0]],[a[2],a[0],a[1]],[a[2],a[1],a[0]]]}
function orderScore(order){return order.reduce((s,c,i)=>s+individualScore(c,[])*[1,.86,.72][i],0)}
function shortlist(combos,evidence){const sets=[...ARCHETYPES.map(a=>[...combos].sort((x,y)=>winChance(y,a)-winChance(x,a)).slice(0,24)),[...combos].sort((x,y)=>individualScore(y,evidence)-individualScore(x,evidence)).slice(0,40)];const byCore=new Map();for(const c of combos){const core=c.parts.find(p=>['blade','main','metal'].includes(p.category))?.canonicalKey||c.signature;const arr=byCore.get(core)||[];arr.push(c);byCore.set(core,arr)}for(const arr of byCore.values())sets.push(arr.sort((x,y)=>individualScore(y,evidence)-individualScore(x,evidence)).slice(0,5));return [...new Map(sets.flat().map(c=>[c.signature,c])).values()].slice(0,150)}
function analyze(inventory,evidence=[],locks=[]){const combos=generateCombinations(physicalParts(inventory));if(combos.length<3)return {ready:false,combos,decks:[],reason:'Not enough legal combinations.'};const candidates=shortlist(combos,evidence);const locked=locks.map(sig=>combos.find(c=>c.signature===sig)).filter(Boolean);const decks=[];for(let i=0;i<candidates.length;i++)for(let j=i+1;j<candidates.length;j++)for(let k=j+1;k<candidates.length;k++){const trio=[candidates[i],candidates[j],candidates[k]];if(locked.some(l=>!trio.some(c=>c.signature===l.signature)))continue;if(!isLegalDeck(trio))continue;const metrics=deckMetrics(trio,evidence);const order=permutations(trio).sort((a,b)=>orderScore(b)-orderScore(a))[0];decks.push({id:trio.map(c=>c.signature).sort().join('::'),combos:trio,order,metrics});}decks.sort((a,b)=>b.metrics.score-a.metrics.score);return {ready:decks.length>0,combos,decks:decks.slice(0,8),evaluated:decks.length}}
function explainCombo(combo,deck,evidence){const map=matchupMap(combo),sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]),best=ARCHETYPES.find(a=>a.id===sorted[0][0]),worst=ARCHETYPES.find(a=>a.id===sorted.at(-1)[0]),post=posterior(combo,evidence);const roleReasons={Attack:'Provides the deck’s primary high-point KO pressure.',Stamina:'Protects the deck against long-spin and endurance matchups.',Defense:'Absorbs aggressive openings and reduces self-KO exposure.',Balance:'Covers multiple opponent styles without a severe specialization gap.'};const launch=combo.role==='Attack'?(combo.profile.ctl>=62?'Controlled hard launch with a slight tilt.':'Hard launch; reduce angle if self-KOs appear.'):combo.role==='Stamina'?'Level launch toward a clean center path.':combo.role==='Defense'?'Moderate launch with a slight counter-tilt.':'Controlled launch; adjust angle to the opponent.';return {why:roleReasons[combo.role]||roleReasons.Balance,beats:best.name,struggles:worst.name,launch,confidence:post.games>=20?'High':post.games>=6?'Developing':'Prior only',games:post.games,matchups:map}}
function chooseTest(deck,allCombos,evidence){if(!deck)return null;const subject=[...deck.combos].sort((a,b)=>evidenceFor(a.signature,evidence).games-evidenceFor(b.signature,evidence).games)[0];const weakest=ARCHETYPES.map(a=>({a,p:winChance(subject,a)})).sort((x,y)=>x.p-y.p)[0].a;const opponents=allCombos.filter(c=>c.signature!==subject.signature&&isDisjointPair(subject,c));if(!opponents.length)return null;const opponent=opponents.map(c=>({c,fit:winChance(c,{id:'subject',name:'Subject',v:subject.profile})+(c.role.toLowerCase()===weakest.id?.toLowerCase()?0.08:0)})).sort((a,b)=>b.fit-a.fit)[0].c;return {subject,opponent,weakness:weakest.name,reason:`This owned opponent stresses ${subject.name}'s weakest modeled matchup: ${weakest.name}.`,launch:explainCombo(subject,deck,evidence).launch}}
function recordEvidence(session,results){const wins=results.filter(x=>x==='win').length,losses=results.filter(x=>x==='loss').length;return {id:crypto.randomUUID?.()||String(Date.now()),date:new Date().toISOString(),subjectSignature:session.subject.signature,subjectName:session.subject.name,opponentSignature:session.opponent.signature,opponentName:session.opponent.name,wins,losses}}

function toast(text){toastNode.textContent=text;toastNode.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastNode.classList.remove('show'),2200)}
function routeRenderer(route=currentRoute()){document.querySelectorAll('[data-route]').forEach(a=>a.classList.toggle('active',a.dataset.route===route));const s=getState();app.innerHTML=route==='collection'?renderCollection(s):route==='deck'?renderDeck(s):route==='test'?renderTest(s):renderMatch(s);document.querySelector('#headerStatus').textContent=s.analysisPending?'Coach analyzing…':s.analysis?.ready?`${s.inventory.length} entries · deck ready`:s.inventory.length?`${s.inventory.length} entries · collection incomplete`:'Inventory empty';if(route==='test'&&s.analysis?.ready&&!s.testSession)prepareTest();}
function scheduleAnalysis(){clearTimeout(analysisTimer);const s=getState();setState({analysisPending:true,analysis:null,selectedDeckId:null,testSession:null,testResults:[]},{save:false});analysisTimer=setTimeout(()=>{const now=getState();const result=analyze(now.inventory,now.evidence,now.locks);setState({analysis:result,analysisPending:false,selectedDeckId:result.decks[0]?.id||null,testSession:null,testResults:[]},{save:false});},40)}
function prepareTest(){const s=getState(),deck=s.analysis.decks.find(d=>d.id===s.selectedDeckId)||s.analysis.decks[0];const test=chooseTest(deck,s.analysis.combos,s.evidence);setState({testSession:test,testResults:[]},{save:false})}
subscribe(()=>routeRenderer());startRouter(routeRenderer);
addEventListener('click',e=>{const el=e.target.closest('button,[data-add-product],[data-remove-entry]');if(!el)return;if(el.dataset.addProduct){const p=CATALOG.find(x=>x.id===el.dataset.addProduct);if(!p)return;mutate(s=>s.inventory.push(productToEntry(p)));toast(`${p.code} added`);scheduleAnalysis();return}if(el.dataset.removeEntry){mutate(s=>{s.inventory=s.inventory.filter(x=>x.id!==el.dataset.removeEntry);s.locks=[]});scheduleAnalysis();return}if(el.dataset.filter){setCatalogFilter(el.dataset.filter);routeRenderer();return}if(el.dataset.action==='open-loose'){document.querySelector('#looseDialog')?.showModal();return}if(el.dataset.action==='save-loose'){const name=document.querySelector('#looseName').value.trim();if(!name)return toast('Enter a part name.');const entry=customLoosePart(document.querySelector('#looseCategory').value,name,document.querySelector('#looseRole').value);mutate(s=>s.inventory.push(entry));document.querySelector('#looseDialog').close();scheduleAnalysis();toast('Loose part added');return}if(el.dataset.lockCombo){mutate(s=>{const sig=el.dataset.lockCombo;s.locks=s.locks.includes(sig)?s.locks.filter(x=>x!==sig):s.locks.length<2?[...s.locks,sig]:[s.locks[1],sig]});scheduleAnalysis();return}if(el.dataset.selectDeck){setState({selectedDeckId:el.dataset.selectDeck,testSession:null,testResults:[]});return}if(el.dataset.testResult){const results=[...(getState().testResults||[]),el.dataset.testResult].slice(0,3);if(results.length<3){setState({testResults:results},{save:false});return}const session=getState().testSession;mutate(s=>s.evidence.push(recordEvidence(session,results)));toast('Three-battle test saved');scheduleAnalysis();go('deck');return}if(el.dataset.scoreSide){mutate(s=>{const side=el.dataset.scoreSide,points=Number(el.dataset.points);s.match[side]=Math.min(7,s.match[side]+points);s.match.battles.push({side,points,finish:el.dataset.finish})});return}if(el.dataset.action==='reset-match'){setState({match:{me:0,opponent:0,battles:[]}});return}if(el.dataset.action==='open-settings'){document.querySelector('#settingsDialog').showModal();return}if(el.dataset.action==='reset-app'){if(confirm('Delete all inventory and evidence?')){reset();document.querySelector('#settingsDialog').close();go('collection')}return}if(el.dataset.action==='export-data'){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([exportState()],{type:'application/json'}));a.download='x-tournament-director-backup.json';a.click();URL.revokeObjectURL(a.href);return}});
addEventListener('input',e=>{if(e.target.id==='catalogSearch'){setCatalogQuery(e.target.value);routeRenderer()}});
addEventListener('change',async e=>{if(e.target.dataset.action==='import-data'){try{importState(await e.target.files[0].text());scheduleAnalysis();document.querySelector('#settingsDialog').close();toast('Backup restored')}catch(err){toast(err.message)}}});
if(getState().inventory.length)scheduleAnalysis();

</script>
</body>
</html>
