<script>
window.addEventListener('error',function(event){
  const app=document.getElementById('app');
  if(app && !app.children.length){
    app.innerHTML='<section class="card" style="margin-top:20px"><div class="eyebrow">Startup error</div><h1>The app could not start.</h1><p class="muted">Reload once. If this message remains, replace the repository with the latest root-only package.</p><pre style="white-space:pre-wrap;color:#ffabb3">'+String(event.message||'Unknown error').replace(/[&<>]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]})+'</pre></section>';
  }
});
</script>

// src/state.js
const KEY='x-tournament-director-v3';
const defaults={inventory:[],evidence:[],locks:[],analysis:null,selectedDeckId:null,testSession:null,testResults:[],testSetup:{launch:'recommended',position:'center',meaningfulContact:true,lossContext:'none'},previousDeckSnapshot:null,deckChange:null,match:{me:0,opponent:0,battles:[]},catalogFilter:'all'};
let memory=null;
function readRaw(){try{return localStorage.getItem(KEY)}catch{return memory}}
function readLegacy(){try{return localStorage.getItem('x-tournament-director-v2')}catch{return null}}
function writeRaw(value){memory=value;try{localStorage.setItem(KEY,value)}catch{}}
function removeRaw(){memory=null;try{localStorage.removeItem(KEY)}catch{}}
let state=load();
const listeners=new Set();
function load(){try{const current=readRaw(),raw=current||readLegacy()||'{}',parsed=JSON.parse(raw);if(!current&&raw!=='{}')writeRaw(raw);return {...structuredClone(defaults),...parsed,analysis:null,testSession:null,testResults:[],previousDeckSnapshot:null,deckChange:null,testSetup:{...defaults.testSetup,...(parsed.testSetup||{})}}}catch{return structuredClone(defaults)}}
function persist(){const {analysis,testSession,testResults,previousDeckSnapshot,deckChange,...saved}=state;writeRaw(JSON.stringify(saved))}
function getState(){return state}
function setState(patch,{save=true}={}){state={...state,...patch};if(save)persist();listeners.forEach(fn=>fn(state))}
function mutate(fn,{save=true}={}){const next=structuredClone(state);fn(next);state=next;if(save)persist();listeners.forEach(fn=>fn(state))}
function subscribe(fn){listeners.add(fn);return()=>listeners.delete(fn)}
function reset(){state=structuredClone(defaults);removeRaw();listeners.forEach(fn=>fn(state))}
function exportState(){const {analysis,testSession,testResults,previousDeckSnapshot,deckChange,...saved}=state;return JSON.stringify({version:3,exportedAt:new Date().toISOString(),state:saved},null,2)}
function importState(raw){const data=JSON.parse(raw);const incoming=data.state||data;if(!Array.isArray(incoming.inventory)||!Array.isArray(incoming.evidence))throw new Error('Invalid backup file.');state={...structuredClone(defaults),...incoming,analysis:null,testSession:null,testResults:[],previousDeckSnapshot:null,deckChange:null,testSetup:{...defaults.testSetup,...(incoming.testSetup||{})}};persist();listeners.forEach(fn=>fn(state))}

const ROUTES=new Set(['collection','deck','test','match']);
function currentRoute(){const value=location.hash.replace(/^#\/?/,'').split('/')[0];return ROUTES.has(value)?value:'collection'}
function go(route){if(!ROUTES.has(route))route='collection';location.hash=`#/${route}`}
function startRouter(render){addEventListener('hashchange',()=>render(currentRoute()));if(!location.hash)history.replaceState(null,'','#/collection');render(currentRoute())}

<section class="card accent"><div class="test-versus"><div><div class="eyebrow">Use${s.challenger?' · challenger':''}</div><h2>${esc(s.subject.name)}</h2><p class="muted">Recommended launch: ${esc(s.launch)} · position: ${esc(s.position)}</p></div><div class="versus">VS</div><div><div class="eyebrow">Owned opponent</div><h2>${esc(s.opponent.name)}</h2><p class="muted">Both Beys pass the simultaneous physical-allocation check.</p></div></div><hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><strong>Why this matchup</strong><p class="muted">${esc(s.reason)}</p><div class="results">${[0,1,2].map(i=>{const r=state.testResults?.[i];return `<span class="result-dot ${r?(r.winner==='subject'?'win':'loss'):''}" title="${r?`${r.winner==='subject'?s.subject.name:s.opponent.name} · ${r.finish} +${r.points}`:''}">${r?testResultLabel(r):i+1}</span>`}).join('')}</div><div class="test-setup"><label><span>Launch technique</span><select id="testLaunch"><option value="recommended" ${setup.launch==='recommended'?'selected':''}>Recommended</option><option value="hard" ${setup.launch==='hard'?'selected':''}>Hard</option><option value="controlled" ${setup.launch==='controlled'?'selected':''}>Controlled</option><option value="level" ${setup.launch==='level'?'selected':''}>Level</option><option value="tilt" ${setup.launch==='tilt'?'selected':''}>Tilt</option><option value="weak" ${setup.launch==='weak'?'selected':''}>Weak</option></select></label><label><span>Stadium position</span><select id="testPosition"><option value="center" ${setup.position==='center'?'selected':''}>Center</option><option value="x-line" ${setup.position==='x-line'?'selected':''}>X-line</option><option value="outer" ${setup.position==='outer'?'selected':''}>Outer track</option><option value="left" ${setup.position==='left'?'selected':''}>Left side</option><option value="right" ${setup.position==='right'?'selected':''}>Right side</option></select></label><label class="selfko-control contact-control"><input type="checkbox" id="testContact" ${setup.meaningfulContact!==false?'checked':''}><span><strong>Meaningful contact occurred</strong><br><span class="muted">Turn off for a no-contact spin result. Those battles receive reduced matchup weight.</span></span></label></div><label style="display:grid;gap:7px;margin-top:16px"><span><strong>Loss context</strong></span><select id="testLossContext"><option value="none" ${setup.lossContext==='none'?'selected':''}>Normal finish</option><option value="self-ko" ${setup.lossContext==='self-ko'?'selected':''}>Losing Bey self-KO</option><option value="launch-error" ${setup.lossContext==='launch-error'?'selected':''}>Losing Bey launch error</option></select><span class="muted">Self-KO and launch-error results are tracked separately and receive reduced matchup weight.</span></label><div class="test-finish-panels">${finishButtons('subject',s.subject.name,'secondary')}${finishButtons('opponent',s.opponent.name,'danger')}</div><div class="button-row" style="margin-top:14px"><button class="button ghost" data-action="undo-test-result" ${state.testResults?.length?'':'disabled'}>Undo last battle</button></div><p class="muted">Spin = 1, Over/Burst = 2, Xtreme = 3. Exact combo, components, role, system, opponent archetype, launch, and position all feed the evidence model at different weights.</p></section>
<section class="card" style="margin-top:16px"><h2>Evidence history</h2>${state.evidence.length?state.evidence.slice().reverse().slice(0,10).map(e=>`<div class="history-row"><span>${esc(e.subjectName)} vs ${esc(e.opponentName)}<div class="finish-summary">${esc(evidenceFinishSummary(e))}</div></span><strong>${e.wins}-${e.losses}</strong></div>`).join(''):'<p class="muted">No physical tests recorded yet.</p>'}</section>`}

// src/components/match.js

function renderMatch(state){const m=state.match,done=m.me>=4||m.opponent>=4;return `${pageHead('Step 4','Tournament match','Use the official first-to-four score sheet. Rebuild order after three unresolved battles.')}
<div class="grid two"><section class="card accent"><div class="grid two" style="text-align:center"><div><div class="eyebrow">You</div><div class="score">${m.me}</div></div><div><div class="eyebrow">Opponent</div><div class="score">${m.opponent}</div></div></div>${done?`<h2 style="text-align:center">${m.me>m.opponent?'Match won':'Match lost'}</h2><button class="button" data-action="reset-match" style="width:100%">Start new match</button>`:`<div class="grid two"><div><h3>You scored</h3><div class="finish-grid">${[['Spin',1],['Over',2],['Burst',2],['Xtreme',3]].map(([n,p])=>`<button class="button secondary" data-score-side="me" data-points="${p}" data-finish="${n}">${n} +${p}</button>`).join('')}</div></div><div><h3>Opponent scored</h3><div class="finish-grid">${[['Spin',1],['Over',2],['Burst',2],['Xtreme',3]].map(([n,p])=>`<button class="button secondary" data-score-side="opponent" data-points="${p}" data-finish="${n}">${n} +${p}</button>`).join('')}</div></div></div>`}</section><section class="card"><h2>Battle log</h2>${m.battles.length?m.battles.map((b,i)=>`<div class="history-row"><span>Battle ${i+1} · ${esc(b.finish)}</span><strong>${b.side==='me'?'You':'Opponent'} +${b.points}</strong></div>`).join(''):'<p class="muted">No finishes recorded.</p>'}${!done&&m.battles.length>0&&m.battles.length%3===0?'<div class="card" style="margin-top:12px;background:#322a13"><strong>Rebuild order now</strong><p class="muted">Three battles have completed without the match ending. Both players rebuild their Bey order.</p></div>':''}</section></div>`}


// src/app.js
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(registrations=>registrations.forEach(registration=>registration.unregister())).catch(()=>{});if('caches' in globalThis)caches.keys().then(keys=>Promise.all(keys.map(key=>caches.delete(key)))).catch(()=>{});}

const app=document.querySelector('#app'),toastNode=document.querySelector('#toast');let analysisTimer=null,toastTimer=null;
function toast(text){toastNode.textContent=text;toastNode.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastNode.classList.remove('show'),2400)}
function routeRenderer(route=currentRoute()){document.querySelectorAll('[data-route]').forEach(a=>a.classList.toggle('active',a.dataset.route===route));const s=getState();app.innerHTML=route==='collection'?renderCollection(s):route==='deck'?renderDeck(s):route==='test'?renderTest(s):renderMatch(s);document.querySelector('#headerStatus').textContent=s.analysisPending?'Coach analyzing…':s.analysis?.ready?`${s.analysis.readiness.state} · ${Math.round(s.analysis.confidence*100)}% confidence`:s.inventory.length?`${s.inventory.length} entries · collection incomplete`:'Inventory empty';if(route==='test'&&s.analysis?.ready&&!s.testSession)prepareTest();}
function currentDeckSnapshot(s){const deck=s.analysis?.decks?.find(d=>d.id===s.selectedDeckId)||s.analysis?.decks?.[0];return deck?.combos?.map(c=>({signature:c.signature,name:c.name}))||s.previousDeckSnapshot||[]}
function scheduleAnalysis(){clearTimeout(analysisTimer);const s=getState(),previous=currentDeckSnapshot(s);setState({analysisPending:true,analysis:null,selectedDeckId:null,testSession:null,testResults:[],previousDeckSnapshot:previous},{save:false});analysisTimer=setTimeout(()=>{const now=getState(),result=analyze(now.inventory,now.evidence,now.locks,now.previousDeckSnapshot||[]);setState({analysis:result,analysisPending:false,selectedDeckId:result.decks[0]?.id||null,testSession:null,testResults:[],deckChange:result.change},{save:false});},45)}
function prepareTest(){const s=getState(),test=chooseTest(s.analysis,s.evidence);setState({testSession:test,testResults:[],testSetup:{launch:'recommended',position:test?.position||'center',meaningfulContact:true,lossContext:'none'}},{save:false})}
let deferredRender=false;function searchHasFocus(){const a=document.activeElement;return !!(a&&a.id==='catalogSearch')}function subscribedRender(){if(searchHasFocus()){deferredRender=true;return}routeRenderer()}subscribe(subscribedRender);startRouter(routeRenderer);
addEventListener('click',e=>{const el=e.target.closest('button,[data-add-product],[data-remove-entry]');if(!el)return;if(el.dataset.addProduct){const p=CATALOG.find(x=>x.id===el.dataset.addProduct);if(!p)return;mutate(s=>s.inventory.push(productToEntry(p)));toast(`${p.code} added`);scheduleAnalysis();return}if(el.dataset.removeEntry){mutate(s=>{s.inventory=s.inventory.filter(x=>x.id!==el.dataset.removeEntry);s.locks=[]});scheduleAnalysis();return}if(el.dataset.filter){setCatalogFilter(el.dataset.filter);routeRenderer();return}if(el.dataset.action==='open-loose'){document.querySelector('#looseDialog')?.showModal();return}if(el.dataset.action==='save-loose'){const name=document.querySelector('#looseName').value.trim();if(!name)return toast('Enter a part name.');const entry=customLoosePart(document.querySelector('#looseCategory').value,name,document.querySelector('#looseRole').value);mutate(s=>s.inventory.push(entry));document.querySelector('#looseDialog').close();scheduleAnalysis();toast('Loose part added');return}if(el.dataset.lockCombo){mutate(s=>{const sig=el.dataset.lockCombo;s.locks=s.locks.includes(sig)?s.locks.filter(x=>x!==sig):s.locks.length<2?[...s.locks,sig]:[s.locks[1],sig]});scheduleAnalysis();return}if(el.dataset.selectDeck){setState({selectedDeckId:el.dataset.selectDeck,testSession:null,testResults:[]});return}if(el.dataset.testWinner){const setup={launch:document.querySelector('#testLaunch')?.value||'recommended',position:document.querySelector('#testPosition')?.value||'center',meaningfulContact:Boolean(document.querySelector('#testContact')?.checked),lossContext:document.querySelector('#testLossContext')?.value||'none'},selfKO=setup.lossContext==='self-ko',launchError=setup.lossContext==='launch-error',result={winner:el.dataset.testWinner,finish:el.dataset.testFinish,points:Number(el.dataset.testPoints),selfKO,launchError,launch:setup.launch,position:setup.position,meaningfulContact:setup.meaningfulContact},results=[...(getState().testResults||[]),result].slice(0,3);if(results.length<3){setState({testResults:results,testSetup:setup},{save:false});return}const session=getState().testSession;mutate(s=>s.evidence.push(recordEvidence(session,results)));toast('Three-battle evidence batch saved');scheduleAnalysis();go('deck');return}if(el.dataset.action==='undo-test-result'){setState({testResults:(getState().testResults||[]).slice(0,-1)},{save:false});return}if(el.dataset.scoreSide){mutate(s=>{const side=el.dataset.scoreSide,points=Number(el.dataset.points);s.match[side]=Math.min(7,s.match[side]+points);s.match.battles.push({side,points,finish:el.dataset.finish})});return}if(el.dataset.action==='reset-match'){setState({match:{me:0,opponent:0,battles:[]}});return}if(el.dataset.action==='open-settings'){document.querySelector('#settingsDialog').showModal();return}if(el.dataset.action==='reset-app'){if(confirm('Delete all inventory and evidence?')){reset();document.querySelector('#settingsDialog').close();go('collection')}return}if(el.dataset.action==='export-data'){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([exportState()],{type:'application/json'}));a.download='x-tournament-director-v3-backup.json';a.click();URL.revokeObjectURL(a.href);return}});
addEventListener('input',e=>{if(e.target.id==='catalogSearch'){setCatalogQuery(e.target.value);updateCatalogList()}});addEventListener('focusout',e=>{if(e.target.id==='catalogSearch'&&deferredRender){deferredRender=false;requestAnimationFrame(()=>routeRenderer())}});
addEventListener('change',async e=>{if(['testLaunch','testPosition','testContact','testLossContext'].includes(e.target.id)){setState({testSetup:{launch:document.querySelector('#testLaunch')?.value||'recommended',position:document.querySelector('#testPosition')?.value||'center',meaningfulContact:Boolean(document.querySelector('#testContact')?.checked),lossContext:document.querySelector('#testLossContext')?.value||'none'}},{save:false});return}if(e.target.dataset.action==='import-data'){try{importState(await e.target.files[0].text());scheduleAnalysis();document.querySelector('#settingsDialog').close();toast('Backup restored')}catch(err){toast(err.message)}}});
if(getState().inventory.length)scheduleAnalysis();
